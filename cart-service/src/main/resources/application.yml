server:
  port: 8083

spring:
  application:
    name: cart-service

  config:
    import: "optional:configserver:http://config-server:8888"

  data:
    mongodb:
      uri: mongodb://admin:password@mongodb:27017/cartdb?authSource=admin

eureka:
  client:
    service-url:
      defaultZone: http://eureka-server:8761/eureka

logging:
  file:
    name: /app/logs/cart-service.log
  level:
    root: INFO
  pattern:
    level: "%5p [${spring.application.name}, traceId=%X{traceId}, spanId=%X{spanId}]"

management:
  tracing:
    sampling:
      probability: 1.0  # capture all requests (dev only)
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans